# Stable release orchestrator. Drives `release-local-stable.mjs`, which
# releases each package in the right chain on one runner, with one queue
# slot and one permission context (including PyPI OIDC).
#
# Tools chain (CLI -> SDK -> MCP) ships together because SDK packages
# CLI native binaries and MCP imports SDK + engine code. Core chain
# (currently superdoc) ships independently of the tools chain.
#
# Out of scope: esign, template-builder. Each has its own stable workflow
# until brought into the orchestrator.
name: 📦 Release stable tooling (CLI/SDK/MCP)

on:
  push:
    branches:
      - stable
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  # All stable release workflows (this bundle + superdoc + react/esign/
  # template-builder/vscode-ext) share the `release-stable` group so that
  # @semantic-release/git pushes to `stable` serialize. Per-workflow groups
  # would let multiple workflows publish in parallel and race on
  # `git push origin stable`, leaving npm/PyPI tarballs published without
  # a corresponding tag/commit pushed.
  # [skip ci] writeback runs use a per-run group so they cannot evict a real
  # pending stable push while the bundle is active. queue: max keeps GitHub
  # from dropping older pending stable releases when a stable push touches
  # multiple wrapper packages; default queue: single only allows one pending.
  group: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, '[skip ci]') && format('release-stable-skip-{0}', github.run_id) || 'release-stable' }}
  cancel-in-progress: false
  queue: max

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-24.04
    environment: pypi
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: stable
          token: ${{ steps.generate_token.outputs.token }}

      - name: Refresh stable branch head
        run: |
          git fetch origin stable --tags
          git checkout -B stable origin/stable

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          # DO NOT BUMP without verifying macOS darwin-arm64 binary signing.
          # Bun 1.3.12+ regressed `bun build --compile` macOS code signing
          # (oven-sh/bun#29120, oven-sh/bun#29361), which causes the embedded
          # CLI in the Python SDK wheel to be SIGKILL'd by Gatekeeper on macOS.
          # Tracked in SD-2784 — unpin once explicit codesign step lands.
          bun-version: 1.3.11

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: ~/apt-cache
          key: apt-canvas-${{ runner.os }}-v1

      - name: Install canvas system dependencies
        run: |
          mkdir -p ~/apt-cache
          sudo apt-get update
          sudo apt-get install -y -o Dir::Cache::Archives="$HOME/apt-cache" \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev \
            libpixman-1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python build tools
        run: pip install build

      - name: Build packages
        run: pnpm run build

      # Public-type contract gates: same gates as PR CI and
      # release-superdoc.yml. The stable orchestrator publishes the npm
      # `latest` tag, so a regression that bypassed PR CI would otherwise
      # ship to every consumer pinned to `^1` or `latest`. Run identical
      # checks here so the stable lane cannot silently relax the gate.
      - name: Consumer typecheck (matrix)
        run: |
          cd tests/consumer-typecheck
          node typecheck-matrix.mjs

      - name: Deep public-type audit (report-only)
        run: |
          cd tests/consumer-typecheck
          node deep-type-audit.mjs

      - name: Package shape gates
        run: node tests/consumer-typecheck/package-shape-gate.mjs

      - name: Legacy public no-growth gates (SD-3176)
        run: |
          node tests/consumer-typecheck/snapshot-super-editor-package-exports.mjs --check
          node tests/consumer-typecheck/snapshot-superdoc-legacy-exports.mjs --check

      - name: Release stable packages (orchestrator)
        id: stable_release
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          LINEAR_TOKEN: ${{ secrets.LINEAR_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # vsce needs VSCE_PAT to authenticate to the VS Code Marketplace
          # during the vscode-ext step of the core chain.
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          GITHUB_REF_NAME: stable
        run: node scripts/release-local-stable.mjs

      # SDK release coordinates come from the orchestrator's step outputs, not
      # `git tag --points-at HEAD`. After CLI -> SDK -> MCP, HEAD lands on
      # MCP's version commit and the SDK tag is no longer at HEAD.
      #
      # PyPI publish steps disabled: trusted-publisher config and per-project
      # storage cap need to be sorted on the PyPI side before re-enabling.
      # Restore by uncommenting once access is back.
      # - name: Publish recovered SDK companion Python packages to PyPI
      #   if: steps.stable_release.outputs.sdk_python_snapshot_companion_dir != ''
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: ${{ steps.stable_release.outputs.sdk_python_snapshot_companion_dir }}
      #     skip-existing: true
      #
      # - name: Publish recovered SDK main Python package to PyPI
      #   if: steps.stable_release.outputs.sdk_python_snapshot_main_dir != ''
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: ${{ steps.stable_release.outputs.sdk_python_snapshot_main_dir }}
      #     skip-existing: true

      - name: Build and verify Python SDK
        if: steps.stable_release.outputs.sdk_release_present == 'true'
        run: node packages/sdk/scripts/build-python-sdk.mjs

      # - name: Publish companion Python packages to PyPI
      #   if: steps.stable_release.outputs.sdk_release_present == 'true'
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: packages/sdk/langs/python/companion-dist/
      #     skip-existing: true
      #
      # - name: Publish main Python SDK to PyPI
      #   if: steps.stable_release.outputs.sdk_release_present == 'true'
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: packages/sdk/langs/python/dist/
      #     skip-existing: true
      # Docs promotion lives in promote-stable-docs.yml. It triggers off this
      # workflow's completion and gates on whether a real superdoc v* tag was
      # created during the run, so tools-only releases leave docs-stable
      # unchanged automatically.
