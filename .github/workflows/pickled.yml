name: Pickled

permissions:
  contents: read

on:
  pull_request:
    paths:
      - pickled.yml
      - fixtures/pickled/**
      - .github/workflows/pickled.yml
      - AGENTS.md
      - apps/docs/llms.txt
      - apps/docs/llms-full.txt
      - packages/react/README.md
      - packages/document-api/README.md
      - apps/mcp/README.md
      - apps/cli/README.md
      - packages/superdoc/scripts/README.md
  workflow_dispatch:
    inputs:
      max_cells:
        description: Max Pickled cells for real-agent jobs
        required: false
        default: '20'

concurrency:
  group: pickled-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Calibrate answer examples
        run: bunx @pickled-dev/cli test .

      - name: Plan question cells
        run: bunx @pickled-dev/cli check . --plan

      - name: Plan build cells
        run: bunx @pickled-dev/cli build . --plan

  real-agent:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY_PICKLED: ${{ secrets.ANTHROPIC_API_KEY_PICKLED }}
      ANTHROPIC_API_KEY_DEFAULT: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Check secret availability
        run: |
          if [ -n "${ANTHROPIC_API_KEY_PICKLED:-}" ]; then
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY_PICKLED}" >> "$GITHUB_ENV"
          elif [ -n "${ANTHROPIC_API_KEY_DEFAULT:-}" ]; then
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY_DEFAULT}" >> "$GITHUB_ENV"
          else
            echo "::error::ANTHROPIC_API_KEY_PICKLED or ANTHROPIC_API_KEY is required for real-agent Pickled runs"
            exit 1
          fi

      - name: Prepare Pickled reports
        run: mkdir -p pickled-reports

      - name: Run real-agent questions
        id: questions
        run: |
          set +e
          bunx @pickled-dev/cli check . \
            --max-cells "${{ github.event.inputs.max_cells || '20' }}" \
            --output pickled-reports/questions.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Add question summary
        if: always()
        run: |
          if [ -f pickled-reports/questions.json ]; then
            bunx @pickled-dev/cli report pickled-reports/questions.json --format markdown >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No Pickled question receipt was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run real-agent builds
        id: builds
        run: |
          set +e
          bunx @pickled-dev/cli build . \
            --max-cells 4 \
            --output pickled-reports/builds.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Add build summary
        if: always()
        run: |
          if [ -f pickled-reports/builds.json ]; then
            bunx @pickled-dev/cli report pickled-reports/builds.json --format markdown >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No Pickled build receipt was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Pickled reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pickled-reports
          path: pickled-reports/*.json
          if-no-files-found: ignore

      - name: Reflect Pickled verdict
        if: always()
        run: |
          question_status="${{ steps.questions.outputs.exit_code }}"
          build_status="${{ steps.builds.outputs.exit_code }}"
          if [ "${question_status:-0}" -ne 0 ]; then
            exit "$question_status"
          fi
          if [ "${build_status:-0}" -ne 0 ]; then
            exit "$build_status"
          fi
