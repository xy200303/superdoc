# =============================================================================
# MULTI-STEP — compound operations, trace sequence matters most
# =============================================================================

- description: 'Multi-step: find section + insert after'
  vars:
    fixture: memorandum.docx
    keepFile: true
    task: 'Find the section about "Alternative Transaction Proposals" and add a paragraph right after it that says "NOTE: Legal review required for this section."'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        if (!d.documentText?.includes('NOTE: Legal review required'))
          return { pass: false, score: 0, reason: 'Note not added' };
        return { pass: true, score: 1, reason: 'Note inserted' };
    - type: javascript
      value: file://lib/checks.cjs:traceAllOk
    - type: javascript
      value: file://lib/checks.cjs:traceLog
    - type: javascript
      value: |
        const d = JSON.parse(output);
        if (!d.trace) return { pass: true, score: 0.5, reason: 'No trace' };
        const tools = d.trace.flatMap(s => s.toolCalls.map(tc => tc.tool));
        if (tools.length < 2) return { pass: false, score: 0, reason: `Only ${tools.length} tool call — expected search + insert` };
        return { pass: true, score: 1, reason: `${tools.length} steps: ${tools.join(' → ')}` };
      metric: multi_step

- description: 'Multi-step: replace + disclaimer'
  vars:
    fixture: memorandum.docx
    keepFile: true
    task: 'Replace "[lawyer]" with "Sarah Chen, Partner" and add a heading "DISCLAIMER" at the end followed by "This document does not constitute legal advice."'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('Sarah Chen') || t.includes('[lawyer]') || !t.includes('DISCLAIMER'))
          return { pass: false, score: 0, reason: 'Incomplete' };
        return { pass: true, score: 1, reason: 'Both operations done' };
    - type: javascript
      value: file://lib/checks.cjs:traceAllOk
    - type: javascript
      value: file://lib/checks.cjs:traceLog
    - type: javascript
      value: |
        const d = JSON.parse(output);
        if (!d.trace) return { pass: true, score: 0.5, reason: 'No trace' };
        const tools = d.trace.flatMap(s => s.toolCalls.map(tc => tc.tool));
        if (tools.length < 3) return { pass: false, score: 0, reason: `Only ${tools.length} calls — expected search + replace + create` };
        return { pass: true, score: 1, reason: `${tools.length} steps: ${tools.join(' → ')}` };
      metric: multi_step

