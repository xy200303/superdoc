# =============================================================================
# MEMORANDUM.DOCX — legal memo
# =============================================================================

- description: 'Read: legal memo'
  vars:
    fixture: memorandum.docx
    keepFile: true
    task: 'Get the full text of this document.'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('MEMORANDUM') || !t.includes('$25,000,000'))
          return { pass: false, score: 0, reason: 'Key content missing' };
        return { pass: true, score: 1, reason: 'All sections present' };
    - type: javascript
      value: file://lib/checks.cjs:traceLog
    - type: javascript
      value: file://lib/checks.cjs:traceAllOk

- description: 'Replace: party name globally'
  vars:
    fixture: memorandum.docx
    keepFile: true
    task: 'Replace "General Counsel" with "Chief Legal Officer" everywhere in the document.'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('Chief Legal Officer') || t.includes('General Counsel'))
          return { pass: false, score: 0, reason: 'Replace incomplete' };
        return { pass: true, score: 1, reason: 'All replaced' };
    - type: javascript
      value: file://lib/checks.cjs:traceAllOk
    - type: javascript
      value: file://lib/checks.cjs:traceLog

- description: 'Replace: date precision ($25M/$150M untouched)'
  vars:
    fixture: memorandum.docx
    keepFile: true
    task: 'Replace the acquisition limit of "$25,000,000" with "$50,000,000".'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('$50,000,000')) return { pass: false, score: 0, reason: 'Missing $50M' };
        if (t.includes('$25,000,000')) return { pass: false, score: 0, reason: '$25M still there' };
        if (!t.includes('$150,000,000')) return { pass: false, score: 0, reason: 'Collateral: $150M gone' };
        return { pass: true, score: 1, reason: 'Precise replace' };
    - type: javascript
      value: file://lib/checks.cjs:traceAllOk
    - type: javascript
      value: file://lib/checks.cjs:traceLog
    - type: javascript
      value: |
        const d = JSON.parse(output);
        if (!d.trace) return { pass: true, score: 0.5, reason: 'No trace' };
        const tools = d.trace.flatMap(s => s.toolCalls.map(tc => tc.tool));
        const hasSearch = tools.some(t => t.includes('search'));
        const hasEdit = tools.some(t => t.includes('edit') || t.includes('mutations'));
        // Mutations with inline selectors (by: "select") do search internally — accept both patterns
        const hasMutationsWithSelect = d.toolCalls?.some(tc =>
          tc.tool === 'superdoc_mutations' && tc.args?.steps?.some(s => s.where?.by === 'select'));
        if (!hasSearch && !hasMutationsWithSelect) return { pass: false, score: 0, reason: `No search step. Tools: ${tools.join('→')}` };
        if (!hasEdit) return { pass: false, score: 0, reason: `No edit step. Tools: ${tools.join('→')}` };
        return { pass: true, score: 1, reason: `Sequence: ${tools.join(' → ')}` };
      metric: sequence

