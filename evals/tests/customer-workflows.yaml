        const tools = d.trace.flatMap(s => s.toolCalls.map(tc => tc.tool));
        const hasFormat = tools.some(t => t.includes('format'));
        // Also accept superdoc_mutations with format.apply steps (equivalent)
        const hasMutationFormat = d.toolCalls?.some(tc =>
