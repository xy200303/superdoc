# G. MULTI-STEP COMPOUND OPERATIONS (Lighthouse, Athena, Irys)
# Customers: Lighthouse (review + edit), Athena (search + insert), Irys (rename + modify)
# =============================================================================

- description: 'Offer: fill multiple placeholders'
  vars:
    fixture: employment-offer.docx
    keepFile: true
    task: 'Replace all placeholders in the document: "[Candidate Name]" with "Alex Johnson", "[Candidate Address]" with "456 Oak Street, Austin, TX 78701", "[Response Deadline]" with "April 1, 2025", "[Hiring Manager Name]" with "Sarah Chen", and "[Title]" with "VP of Engineering".'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        const checks = [
          ['Alex Johnson', '[Candidate Name]'],
          ['456 Oak Street', '[Candidate Address]'],
          ['April 1, 2025', '[Response Deadline]'],
          ['Sarah Chen', '[Hiring Manager Name]'],
        ];
        for (const [expected, gone] of checks) {
          if (!t.includes(expected)) return { pass: false, score: 0, reason: `Missing: ${expected}` };
          if (t.includes(gone)) return { pass: false, score: 0, reason: `Still present: ${gone}` };
        }
        return { pass: true, score: 1, reason: 'All placeholders filled' };
    - type: javascript
      value: file://lib/checks.cjs:traceAllOk
    - type: javascript
      value: file://lib/checks.cjs:traceLog
    - type: javascript
      value: |
        const d = JSON.parse(output);
        if (!d.trace) return { pass: true, score: 0.5, reason: 'No trace' };
        const count = d.stepCount || d.trace.length;
        if (count > 8) return { pass: false, score: 0, reason: `${count} steps — too many for placeholder fill` };
        return { pass: true, score: 1, reason: `${count} steps` };
      metric: efficiency

