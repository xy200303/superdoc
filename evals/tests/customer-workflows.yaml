# Customer workflow tests — validates real-world AI use cases from production customers.
#
# Mapped from: Clauze (contract review), AcuityMD (medical devices), Irys (SaaS terms),
# Athena (investment memos), Torke (citations), Lighthouse (corporate docs),
# Orbital (leases), Tryal (clinical trials), Reavant (SDK mutations).
#
# Each test exercises a documented customer workflow against a domain-specific DOCX fixture.
# Assertions validate document content + tool execution trace.

# =============================================================================
# A. NDA / CONTRACT REVIEW & MODIFICATION (Clauze, Irys)
# Customers: Clauze (clause modification, risk ID), Irys (entity rename, rewrite)
# =============================================================================

- description: 'NDA: modify indemnification from mutual to one-way'
  vars:
    fixture: nda.docx
    keepFile: true
    task: 'In the Indemnification section, change "Each Party shall mutually indemnify" to "The Receiving Party shall indemnify the Disclosing Party".'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('Receiving Party shall indemnify the Disclosing Party'))
          return { pass: false, score: 0, reason: 'Indemnification not modified' };
        if (t.includes('mutually indemnify'))
          return { pass: false, score: 0, reason: 'Still says mutually indemnify' };
        return { pass: true, score: 1, reason: 'Clause modified correctly' };
    - type: javascript
      value: file://lib/checks.cjs:traceAllOk
    - type: javascript
      value: file://lib/checks.cjs:traceLog

- description: 'NDA: global entity name replacement (Iqidis → Irys)'
  vars:
    fixture: nda.docx
    keepFile: true
    task: 'Replace "Iqidis Corp" with "Irys Inc." and "legal@iqidis.com" with "legal@irys.com" everywhere in the document.'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (t.includes('Iqidis') || t.includes('iqidis'))
          return { pass: false, score: 0, reason: 'Old entity name still present' };
        if (!t.includes('Irys Inc.') || !t.includes('legal@irys.com'))
          return { pass: false, score: 0, reason: 'New names not found' };
        if (!t.includes('TechVentures'))
          return { pass: false, score: 0, reason: 'Collateral: other party name removed' };
        return { pass: true, score: 1, reason: 'Entity names replaced correctly' };
    - type: javascript
      value: file://lib/checks.cjs:traceAllOk
    - type: javascript
      value: file://lib/checks.cjs:traceLog

