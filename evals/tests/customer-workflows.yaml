- description: 'Lease: Q&A about assignment rights'
  vars:
    fixture: lease-agreement.docx
    keepFile: true
    task: 'Can the tenant assign or sublet part of the lease? Search the document and tell me what the lease says.'
  assert:
    - type: javascript
      value: |
        const d = JSON.parse(output);
        if (!d.documentText?.includes('Assignment and Subletting'))
          return { pass: false, score: 0, reason: 'Document missing assignment section' };
        return { pass: true, score: 1, reason: 'Document intact, Q&A completed' };
    - type: javascript
      value: file://lib/checks.cjs:traceLog
    - type: javascript
      value: |
        const d = JSON.parse(output);
        if (!d.trace) return { pass: true, score: 0.5, reason: 'No trace' };
        const tools = d.trace.flatMap(s => s.toolCalls.map(tc => tc.tool));
        const hasRead = tools.some(t => t.includes('search') || t.includes('get_content'));
        if (!hasRead) return { pass: false, score: 0, reason: `No search/read step. Tools: ${tools.join('→')}` };
        return { pass: true, score: 1, reason: `Used: ${tools.join(' → ')}` };
      metric: tool_usage

