pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,jsx,ts,tsx,css,scss,json,vue}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm exec eslint --fix --no-warn-ignored {staged_files}
      stage_fixed: true
    cli-build:
      glob: "apps/cli/**/*.{ts,js}"
      run: pnpm --prefix apps/cli run build
    vscode-lint:
      root: "apps/vscode-ext/"
      glob: "apps/vscode-ext/**/*.{ts,js}"
      run: pnpm run lint
    docs-check-imports:
      root: "apps/docs/"
      glob: "apps/docs/**/*.mdx"
      run: pnpm run check:imports
    docs-check-icons:
      root: "apps/docs/"
      glob: "apps/docs/**/*.{mdx,json}"
      run: pnpm run check:icons
    docs-check-em-dashes:
      glob: "{apps/docs/**/*.{mdx,txt,json},apps/docs/scripts/*.ts,packages/document-api/src/contract/operation-definitions.ts}"
      run: pnpm --prefix apps/docs run check:em-dashes
    examples-demos-validate:
      glob: "{demos,examples}/**/*.{md,mdx,js,ts,tsx,jsx,json,html}"
      run: pnpm run check:examples-demos
    docs-test-examples:
      root: "apps/docs/"
      glob: "apps/docs/**/*.mdx"
      run: pnpm run test:examples
    react-type-check:
      root: "packages/react/"
      glob: "packages/react/**/*.{ts,tsx}"
      run: pnpm run type-check
    generate-all:
      glob: "packages/document-api/src/contract/**/*.ts"
      run: pnpm run generate:all && git add apps/docs/document-api/reference apps/docs/document-api/overview.mdx apps/docs/document-engine/sdks.mdx
      stage_fixed: true
    check-dts-shadows:
      glob: "packages/**/*.ts"
      run: node scripts/check-dts-shadows.mjs

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
